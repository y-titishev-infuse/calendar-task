services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: calendar-task-sidebar:latest
    container_name: calendar-task-sidebar
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      # Required when running behind a reverse proxy / on a non-localhost host.
      # Auth.js v5 refuses to trust the Host header without this in production.
      AUTH_TRUST_HOST: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    container_name: calendar-task-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
